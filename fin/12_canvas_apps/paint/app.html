<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sketch Pad</title>
    <!-- Tailwind CSS の CDN 読み込み -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 12%, rgba(34, 211, 238, 0.2), transparent 28rem),
                radial-gradient(circle at 84% 18%, rgba(129, 140, 248, 0.16), transparent 26rem),
                linear-gradient(135deg, #f8fafc 0%, #edf7ff 52%, #f7fbff 100%);
        }

        #drawCanvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
            touch-action: none;
        }

        input[type="color"] {
            appearance: none;
            border: 0;
            padding: 0;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 0;
            border-radius: 999px;
        }
    </style>
</head>

<body class="px-4 py-6 text-slate-900 antialiased sm:px-6 lg:px-8">
    <main class="mx-auto grid min-h-[calc(100vh-3rem)] w-full max-w-7xl gap-6 lg:grid-cols-[19rem_1fr]">
        <aside class="rounded-[2rem] border border-white/80 bg-white/76 p-5 shadow-2xl shadow-sky-950/10 backdrop-blur lg:sticky lg:top-6 lg:self-start">
            <p class="text-xs font-bold uppercase tracking-[0.24em] text-sky-600">Canvas Paint</p>
            <h1 class="mt-3 text-4xl font-black tracking-tight text-slate-950">Sketch Pad</h1>

            <!-- コントロール群 -->
            <div class="mt-7 space-y-5">
                <!-- 色の選択 -->
                <section class="rounded-3xl border border-sky-100 bg-sky-50/60 p-4">
                    <label for="colorPicker" class="text-xs font-bold uppercase tracking-[0.18em] text-sky-700">Color</label>
                    <div class="mt-3 flex items-center gap-3">
                        <input type="color" id="colorPicker" value="#0ea5e9" class="h-12 w-12 cursor-pointer rounded-full shadow-sm">
                        <span id="colorValue" class="font-mono text-sm font-bold text-slate-700">#0ea5e9</span>
                    </div>
                </section>

                <!-- 線の太さの選択 -->
                <section class="rounded-3xl border border-indigo-100 bg-white/72 p-4">
                    <div class="flex items-center justify-between">
                        <label for="lineWidth" class="text-xs font-bold uppercase tracking-[0.18em] text-indigo-700">Brush</label>
                        <span id="lineWidthValue" class="rounded-full bg-indigo-100 px-3 py-1 text-sm font-black text-indigo-700">8</span>
                    </div>
                    <input type="range" id="lineWidth" min="1" max="54" value="8" class="mt-4 w-full accent-sky-500">
                </section>

                <!-- 消しゴムの選択 -->
                <button id="eraserButton"
                    class="w-full rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-black text-slate-700 shadow-sm transition hover:border-sky-200 hover:bg-sky-50">
                    消しゴム OFF
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <!-- リセットボタン -->
                    <button id="resetButton"
                        class="rounded-full border border-rose-200 bg-white px-4 py-3 text-sm font-black text-rose-600 transition hover:bg-rose-50">
                        リセット
                    </button>
                    <!-- ダウンロードボタン -->
                    <button id="downloadButton"
                        class="rounded-full bg-sky-500 px-4 py-3 text-sm font-black text-white shadow-lg shadow-sky-300/40 transition hover:bg-sky-600">
                        PNG保存
                    </button>
                </div>
            </div>
        </aside>

        <section class="flex min-w-0 flex-col rounded-[2rem] border border-white/80 bg-white/70 p-4 shadow-2xl shadow-sky-950/10 backdrop-blur sm:p-6">
            <!-- Canvas 要素 -->
            <div class="overflow-hidden rounded-[1.5rem] border border-slate-200 bg-white shadow-inner">
                <canvas id="drawCanvas" width="1000" height="750"></canvas>
            </div>
        </section>
    </main>

    <!-- 外部 JavaScript の読み込み -->
    <script src="js/app.js"></script>
</body>

</html>
