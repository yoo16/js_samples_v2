<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
</head>

<body class="min-h-screen bg-slate-100 bg-gradient-to-b from-slate-100 to-sky-50 px-4 py-4 text-slate-800">
    <main class="mx-auto flex w-full max-w-5xl flex-col gap-3">
        <section class="rounded-3xl bg-slate-900 px-6 py-8 text-white shadow-xl shadow-slate-300/40">
            <p class="text-sm font-semibold uppercase tracking-[0.2em] text-sky-200">jQuery Memo</p>
            <div class="mt-3 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
                <div>
                    <h1 class="text-3xl font-bold">メモリストアプリ</h1>
                    <p class="mt-2 text-sm leading-6 text-slate-300">
                        単一クリックで選択、ダブルクリックで編集。チェックボックスで完了管理できる、実用的なメモ一覧です。
                    </p>
                </div>
                <div class="rounded-2xl bg-white/10 px-4 py-3 text-sm text-slate-100 backdrop-blur">
                    <p>Enterキーで末尾追加</p>
                    <p>選択中のメモに前後追加</p>
                    <p>チェックで完了</p>
                </div>
            </div>
        </section>

        <section class="grid gap-6 lg:grid-cols-[1.1fr,0.9fr]">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div class="mb-5">
                    <h2 class="text-lg font-semibold">新しいメモを作成</h2>
                    <p class="mt-1 text-sm text-slate-500">短いメモから作業用のメモまで、すぐ追加できます。</p>
                </div>

                <label for="input-text" class="mb-2 block text-sm font-medium text-slate-600">メモ内容</label>
                <input type="text" id="input-text"
                    class="w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 outline-none transition focus:border-sky-400 focus:bg-white focus:ring-4 focus:ring-sky-100"
                    placeholder="ここにメモを入力" />

                <div class="mt-4 grid gap-3 sm:grid-cols-2 xl:grid-cols-5">
                    <button id="btn-append"
                        class="rounded-2xl bg-sky-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-600">末尾に追加</button>
                    <button id="btn-prepend"
                        class="rounded-2xl bg-slate-700 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-800">先頭に追加</button>
                    <button id="btn-before"
                        class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-700 ring-1 ring-slate-300 transition hover:bg-slate-50">選択前に追加</button>
                    <button id="btn-after"
                        class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-700 ring-1 ring-slate-300 transition hover:bg-slate-50">選択後に追加</button>
                </div>

                <div id="message"
                    class="mt-4 min-h-14 rounded-2xl border border-dashed border-transparent px-4 py-3 text-sm"></div>
            </div>

            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div class="flex items-center justify-between gap-4 border-b border-slate-100 pb-4">
                    <div>
                        <h2 class="text-lg font-semibold">メモ一覧</h2>
                        <p class="mt-1 text-sm text-slate-500">選択中の行が青く表示されます。</p>
                    </div>
                    <div class="rounded-full bg-slate-100 px-3 py-1 text-sm font-semibold text-slate-600">
                        <span id="item-count">0</span>件
                    </div>
                </div>

                <p id="empty-state" class="mt-5 rounded-2xl bg-slate-50 px-4 py-6 text-center text-sm text-slate-500">
                    まだメモがありません。上の入力欄から追加してください。
                </p>

                <ul id="item-list" class="mt-5 space-y-3"></ul>
            </div>
        </section>
    </main>

    <script src="js/memo.js"></script>
</body>

</html>
