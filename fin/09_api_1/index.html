<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Samples Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.18),_transparent_30%),radial-gradient(circle_at_bottom_right,_rgba(34,197,94,0.18),_transparent_28%)]">
    </div>

    <main class="mx-auto flex min-h-screen max-w-6xl flex-col px-6 py-16 sm:px-10">
        <header class="max-w-3xl">
            <p class="mb-4 inline-flex rounded-full border border-sky-400/30 bg-sky-400/10 px-4 py-1 text-sm font-semibold text-sky-200">
                API Sample
            </p>
            <h1 class="text-4xl font-black tracking-tight text-white sm:text-5xl">09_api_1</h1>
            <p class="mt-5 text-base leading-7 text-slate-300 sm:text-lg">
                非同期通信
            </p>
        </header>

        <section class="mt-12 grid gap-6 md:grid-cols-2 xl:grid-cols-3">
            <a href="./xhr/app.html"
                class="group rounded-3xl border border-white/10 bg-white/5 p-7 shadow-2xl shadow-slate-950/30 backdrop-blur transition duration-200 hover:-translate-y-1 hover:border-sky-300/50 hover:bg-sky-300/10">
                <div class="flex items-center justify-between">
                    <span class="rounded-full bg-sky-400/15 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-sky-200">XHR</span>
                    <span class="text-sky-200 transition group-hover:translate-x-1">→</span>
                </div>
                <h2 class="mt-5 text-2xl font-bold text-white">メンバーリスト</h2>
                <p class="mt-3 text-sm leading-6 text-slate-300">
                    外部の JSON ファイルを XMLHttpRequest で取得して表示するサンプル。
                </p>
            </a>

            <a href="./fetch/app.html"
                class="group rounded-3xl border border-white/10 bg-white/5 p-7 shadow-2xl shadow-slate-950/30 backdrop-blur transition duration-200 hover:-translate-y-1 hover:border-emerald-300/50 hover:bg-emerald-300/10">
                <div class="flex items-center justify-between">
                    <span class="rounded-full bg-emerald-400/15 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-emerald-200">JSON</span>
                    <span class="text-emerald-200 transition group-hover:translate-x-1">→</span>
                </div>
                <h2 class="mt-5 text-2xl font-bold text-white">ユーザデータ</h2>
                <p class="mt-3 text-sm leading-6 text-slate-300">
                    JSON テキストを読み込み、フォームと表示領域へ反映するサンプル。
                </p>
            </a>

            <a href="./promise/app.html"
                class="group rounded-3xl border border-white/10 bg-white/5 p-7 shadow-2xl shadow-slate-950/30 backdrop-blur transition duration-200 hover:-translate-y-1 hover:border-fuchsia-300/50 hover:bg-fuchsia-300/10">
                <div class="flex items-center justify-between">
                    <span class="rounded-full bg-fuchsia-400/15 px-3 py-1 text-xs font-bold uppercase tracking-[0.2em] text-fuchsia-200">Promise</span>
                    <span class="text-fuchsia-200 transition group-hover:translate-x-1">→</span>
                </div>
                <h2 class="mt-5 text-2xl font-bold text-white">名言ジェネレータ</h2>
                <p class="mt-3 text-sm leading-6 text-slate-300">
                    Promise ベースで API からデータを取得し、画面へ反映するサンプル。
                </p>
            </a>
        </section>
    </main>
</body>

</html>
