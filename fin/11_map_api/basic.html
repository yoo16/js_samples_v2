<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps API Basic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map {
            height: 520px;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-100 p-6 text-slate-800">
    <main class="mx-auto max-w-4xl space-y-5">
        <header class="space-y-2">
            <p class="text-sm font-bold uppercase tracking-wide text-blue-600">Google Maps API</p>
            <h1 class="text-3xl font-bold">Maps JavaScript API + Geocoding API</h1>
            <p class="text-sm text-slate-600">
                住所や施設名を入力すると、Geocoding API で座標に変換して地図とマーカーを更新します。
            </p>
        </header>

        <section class="rounded-lg bg-white p-4 shadow">
            <div class="grid gap-3 md:grid-cols-[1fr_auto_auto]">
                <input id="address" type="text" value="東京タワー" placeholder="住所を入力（例：東京タワー）"
                    class="rounded-lg border border-slate-300 px-4 py-3 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
                <button id="btn-search" type="button"
                    class="rounded-lg bg-blue-600 px-5 py-3 text-sm font-bold text-white transition hover:bg-blue-700">
                    地図を表示
                </button>
                <button id="btn-current" type="button"
                    class="rounded-lg border border-slate-300 bg-white px-5 py-3 text-sm font-bold text-slate-700 transition hover:bg-slate-50">
                    現在地
                </button>
            </div>
            <p id="message" class="mt-3 min-h-5 text-sm text-slate-600"></p>
        </section>

        <section class="overflow-hidden rounded-lg bg-white shadow">
            <div id="map"></div>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/basic.js"></script>
</body>

</html>
